name: Nefkens Private Lease Monitor

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Afhankelijkheden installeren
        run: pip install selenium webdriver-manager

      - name: Chrome en Chromedriver installeren
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Prijzen ophalen en e-mail sturen
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python nefkens_lease_monitor.py

      - name: Opgeslagen prijzen terugzetten in repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add nefkens_prices.json
          git diff --staged --quiet || git commit -m "Prijzen bijgewerkt $(date +'%d-%m-%Y')"
          git push
